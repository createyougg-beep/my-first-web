<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 멋진 첫 웹사이트</title>
    <style>
        /* 여기서부터 CSS(디자인)입니다 */
        body {
            background-color: #f0f4f8; /* 배경색: 연한 파랑 */
            font-family: 'Arial', sans-serif;
            text-align: center; /* 글자 중앙 정렬 */
            padding-top: 50px;
        }
        h1 {
            color: #2b6cb0; /* 제목 색상: 파란색 */
            font-size: 2.5rem;
        }
        p {
            color: #4a5568; /* 본문 색상: 회색 */
            font-size: 1.2rem;
        }
        .btn {
            display: inline-block;
            background-color: #319795; /* 버튼 색상 */
            color: white;
            padding: 12px 24px;
            text-decoration: none; /* 밑줄 제거 */
            border-radius: 8px; /* 버튼 모서리 둥글게 */
            font-weight: bold;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #2c7a7b; /* 마우스 올렸을 때 색상변화 */
        }
    </style>
</head>
<body>

    <h1>🚀 환영합니다! 내 첫 웹사이트입니다</h1>
    <p>어제는 배포를 마스터했고, 오늘은 디자인을 입히는 중입니다.</p>

    <a href="https://www.naver.com" target="_blank" class="btn">네이버로 놀러가기</a>

</body>
</html>
